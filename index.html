<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smaneta Dashboard - Personal Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #0f172a; 
            color: #f1f5f9; 
            overflow-x: hidden;
        }
        .neon-border {
            border: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.1);
        }
        .card-dark {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .deadline-glow {
            border: 1px solid #ef4444;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
            animation: pulse-border 2s infinite;
        }
        @keyframes pulse-border {
            0% { border-color: rgba(239, 68, 68, 0.5); }
            50% { border-color: rgba(239, 68, 68, 1); }
            100% { border-color: rgba(239, 68, 68, 0.5); }
        }
        input {
            background: #1e293b !important;
            color: white !important;
            border: none !important;
        }
        #onboarding-screen {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease;
        }
        .hidden-screen {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        #quote-display { transition: opacity 0.3s ease; }
    </style>
</head>
<body class="min-h-screen">

    <div id="onboarding-screen" class="fixed inset-0 z-[100] bg-slate-950 flex flex-col items-center justify-center p-8">
        <div class="w-full max-w-xs space-y-8 text-center">
            <div class="p-5 bg-violet-600/20 rounded-3xl inline-block neon-border mb-4">
                <i data-lucide="terminal" class="w-12 h-12 text-violet-400"></i>
            </div>
            <div class="space-y-2">
                <h2 class="text-3xl font-bold tracking-tighter text-white">Halo, Kak!</h2>
                <p class="text-slate-400 text-sm">Masukin nama Kakak buat mulai.</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="user-name-input" placeholder="Nama Kakak siapa?" 
                       class="w-full px-6 py-4 rounded-2xl focus:ring-2 focus:ring-violet-500 text-center font-bold outline-none">
                <button onclick="saveName()" class="w-full py-4 bg-violet-600 hover:bg-violet-500 rounded-2xl font-bold shadow-lg shadow-violet-900/20 transition-all active:scale-95 text-white">
                    Masuk Sekarang
                </button>
            </div>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <header class="p-8 pt-12">
            <div class="max-w-md mx-auto flex justify-between items-start">
                <div>
                    <h1 class="text-4xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-fuchsia-400 italic">
                        Hello, <span id="display-name">User</span>.
                    </h1>
                    <p id="date-label" class="text-slate-400 text-sm mt-1 font-light tracking-widest uppercase"></p>
                </div>
                <button onclick="resetName()" class="p-3 bg-slate-800 rounded-2xl neon-border text-slate-500 hover:text-violet-400 transition-colors">
                    <i data-lucide="user-cog" class="w-6 h-6"></i>
                </button>
            </div>
        </header>

        <main class="max-w-md mx-auto px-6 space-y-10 pb-32">
            <section>
                <div class="flex items-center gap-2 mb-6">
                    <div class="h-1 w-8 bg-amber-500 rounded-full shadow-[0_0_10px_rgba(245,158,11,0.8)]"></div>
                    <h2 class="text-xl font-bold tracking-tight">Mood Booster</h2>
                </div>
                <div class="card-dark p-8 rounded-[3rem] text-center neon-border">
                    <div class="bg-violet-500/5 p-6 rounded-[2rem] mb-6 min-h-[120px] flex items-center justify-center border border-dashed border-violet-500/20">
                        <p id="quote-display" class="text-slate-300 text-sm italic leading-relaxed">"Klik tombol di bawah buat dapet asupan kata-kata hari ini!"</p>
                    </div>
                    <button onclick="generateQuote()" class="w-full py-4 bg-gradient-to-r from-amber-600 to-orange-600 text-white rounded-2xl font-bold text-sm shadow-lg active:scale-95 flex items-center justify-center gap-2">
                        <i data-lucide="shuffle" class="w-4 h-4"></i> Acak Kata-kata
                    </button>
                </div>
            </section>

            <section>
                <div class="flex items-center gap-2 mb-6">
                    <div class="h-1 w-8 bg-violet-500 rounded-full"></div>
                    <h2 class="text-xl font-bold tracking-tight">Jadwal Hari Ini</h2>
                </div>
                <div id="schedule-container" class="grid gap-4"></div>
            </section>

            <section>
                <div class="flex items-center gap-2 mb-6">
                    <div class="h-1 w-8 bg-cyan-500 rounded-full shadow-[0_0_10px_rgba(6,182,212,0.8)]"></div>
                    <h2 class="text-xl font-bold tracking-tight">Class Shared Notes</h2>
                </div>
                <div class="card-dark p-6 rounded-[2.5rem] mb-6 neon-border">
                    <input id="class-note-input" placeholder="Info tugas kelas..." class="w-full px-4 py-3.5 rounded-2xl text-sm mb-3">
                    <div class="flex gap-2">
                        <input type="date" id="class-note-date" class="flex-grow px-4 py-3.5 rounded-2xl text-sm">
                        <button id="add-class-note" class="bg-cyan-600 p-4 rounded-2xl active:scale-90">
                            <i data-lucide="share-2" class="text-white"></i>
                        </button>
                    </div>
                </div>
                <div id="class-notes-container" class="space-y-4"></div>
            </section>

            <section>
                <div class="flex items-center gap-2 mb-6">
                    <div class="h-1 w-8 bg-emerald-500 rounded-full shadow-[0_0_10px_rgba(16,185,129,0.8)]"></div>
                    <h2 class="text-xl font-bold tracking-tight">Forum Kelas</h2>
                </div>
                <div id="forum-container" class="space-y-3 mb-6 max-h-80 overflow-y-auto pr-2 custom-scrollbar flex flex-col"></div>
                <div class="card-dark p-4 rounded-[2rem] neon-border flex gap-2">
                    <input id="forum-input" placeholder="Tulis pesan..." class="flex-grow px-4 py-3 rounded-xl text-sm">
                    <button id="send-forum" class="bg-emerald-600 p-3 rounded-xl active:scale-90">
                        <i data-lucide="send" class="text-white w-5 h-5"></i>
                    </button>
                </div>
            </section>

            <footer class="text-center py-10 opacity-30 text-[10px] tracking-[0.3em] uppercase">
                Product of Agil Web Service
            </footer>
        </main>
    </div>

    <script>
        // Quotes & Data
        const allQuotes = ["Chat 'P' doang tapi deg-degannya sampai besok.", "Nunggu balasan dia berasa nunggu hilal, lama bener.", "Jatuh cinta itu gratis, yang mahal itu gengsinya.", "Kita adalah dua orang yang saling tahu, tapi pura-pura bisu.", "'Lagi apa?' adalah kode keras buat 'Gua kangen lo'.", "Mencintai dalam diam itu seperti main catur tanpa raja; nggak ada ujungnya.", "Patah hati pas SMA itu rasanya kayak kiamat, padahal tugas Fisika lebih ngeri.", "Kamu itu kayak variabel x, susah dicari tapi selalu ada di soal hidupku.", "Jangan baper sama perhatian, siapa tahu dia emang ramah ke semua orang.", "Definisi sakit tapi nggak berdarah: Lihat dia ketawa sama yang lain.", "Menunggu itu membosankan, tapi demi kamu, gua jadi pro.", "Sadar diri itu penting, biar nggak terlalu dalam jatuhnya.", "Cinta nggak perlu sempurna, yang penting nggak main belakang.", "Kadang kita cuma butuh didengerin, bukan dinasehatin soal perasaan.", "Mantan itu alumni hati, nggak usah sering-sering kunjungan industri.", "Crush itu penyemangat sekolah, tapi juga sumber galau di pojok kelas.", "Suka sama teman sekelas itu risiko tinggi; kalau putus, tiap hari ketemu.", "Berhenti nyari yang sempurna kalau yang tulus udah di depan mata.", "Hubungan tanpa status itu kayak lari di treadmill; capek tapi nggak maju-maju.", "Cemburu itu tanda sayang, tapi kalau berlebihan itu tanda kurang kerjaan.", "Jangan terlalu berharap sama manusia, kecewanya bisa bikin trauma.", "Cowok sejati itu yang berani nyatain perasaan, bukan main kode-kodean.", "Cewek tulus itu yang mau nemenin dari nol, bukan pas udah di puncak.", "Terkadang kita cuma rindu kenangannya, bukan orangnya.", "Cinta monyet itu lucu, yang nggak lucu itu kalau monyetnya kita.", "Jarak itu ujian, kalau lolos berarti kalian memang pantas.", "Pura-pura nggak lihat pas papasan padahal jantung mau copot.", "Luka hati obatnya bukan orang baru, tapi waktu dan diri sendiri.", "Terlalu nyaman jadi teman adalah jebakan paling menyakitkan.", "Cinta itu kayak trading; harus tahu kapan entry, kapan stop loss.", "Sayang itu tindakan, bukan sekadar kata-kata di bio sosmed.", "Kelak kita akan menertawakan kegalauan kita hari ini.", "Dunia nggak berhenti berputar cuma karena kamu putus cinta.", "Hargai yang ada sekarang, sebelum dia jadi milik orang lain.", "Kenapa harus takut ditolak? Setidaknya kamu sudah mencoba.", "Jadikan dia alasanmu semangat sekolah, bukan alasanmu bolos.", "Teman sejati itu yang berani jujur kalau lo salah.", "Circle kecil itu lebih tenang daripada circle besar tapi penuh drama.", "Sahabat itu yang tahu semua kejelekan lo tapi nggak pergi.", "Nongkrong nggak harus mahal, yang penting obrolannya berbobot.", "Tertawa bareng sahabat itu obat stres paling ampuh setelah ulangan.", "Sahabat sejati bakal narik lo pas lo mulai melenceng dari jalur.", "Masa depan lu nggak ditentukan oleh nilai satu kertas ujian.", "Disiplin itu jembatan antara target dan pencapaian.", "Jangan cuma bermimpi di bawah selimut, bangun dan kerjakan!", "Belajar finansial sejak dini itu bukan soal uang, tapi soal kebebasan.", "Fokus pada proses, hasil itu bonus dari kerja keras.", "Investasi terbaik adalah investasi ke otak sendiri.", "Analisis dulu risikonya, baru ambil langkah besarnya.", "Orang sukses itu yang tetap gerak pas yang lain lagi tidur.", "Jangan takut salah pas belajar, kesalahan adalah guru terbaik.", "Kurangi mengeluh, perbanyak mencari solusi.", "Mental yang kuat dibentuk melalui tekanan yang besar.", "Sukses butuh kesabaran, nggak ada yang instan kecuali mie.", "Jadilah versi terbaik dari dirimu sendiri, bukan fotokopi orang lain.", "Kualitas diri bakal menarik orang yang berkualitas juga."];
        const teacherData = { "Pancasila": "Bu Febi", "Informatika": "Pak Arif", "Bahasa Inggris": "Bu Asih", "Bader": "Bu Lila", "Geografi": "Bu Loka", "Bahasa Indonesia": "Bu Azizah", "PJOK": "Pak Alby", "Matematika": "Bu Intarti", "Sejarah": "Pak Andika", "Kimia": "Bu Deny", "Fisika": "Bu Dewi", "Prakarya dan Kewirausahaan": "Bu Annisa", "Agama": "Bu Ilun", "Sosiologi": "Pak Afi", "Ekonomi": "Bu Novita", "Biologi": "Bu Bidri" };
        const iconMap = { "Pancasila": "landmark", "Informatika": "cpu", "Bahasa Inggris": "languages", "Bader": "book-open", "Geografi": "globe-2", "Bahasa Indonesia": "pen-tool", "PJOK": "activity", "Matematika": "variable", "Sejarah": "history", "Kimia": "beaker", "Fisika": "atom", "Prakarya dan Kewirausahaan": "briefcase", "Sosiologi": "users", "Ekonomi": "trending-up", "Biologi": "dna", "Agama": "heart", "Libur": "coffee" };
        const scheduleData = { "Senin": ["Pancasila", "Informatika", "Bahasa Inggris", "Bader", "Geografi"], "Selasa": ["Bahasa Indonesia", "PJOK", "Matematika", "Sejarah"], "Rabu": ["Kimia", "Fisika", "Bahasa Inggris", "Prakarya dan Kewirausahaan"], "Kamis": ["Matematika", "Agama", "Bader", "Pancasila"], "Jumat": ["Sosiologi", "Bahasa Indonesia", "Ekonomi", "Biologi"], "Sabtu": ["Libur"], "Minggu": ["Libur"] };

        function generateQuote() {
            const display = document.getElementById('quote-display');
            const randomIdx = Math.floor(Math.random() * allQuotes.length);
            display.style.opacity = 0;
            setTimeout(() => {
                display.innerText = `"${allQuotes[randomIdx]}"`;
                display.style.opacity = 1;
            }, 300);
        }

        function saveName() {
            const val = document.getElementById('user-name-input').value;
            if(val) { localStorage.setItem('smaneta_user_name_kak', val); location.reload(); }
        }
        function resetName() { localStorage.removeItem('smaneta_user_name_kak'); location.reload(); }

        window.onload = () => {
            lucide.createIcons();
            const name = localStorage.getItem('smaneta_user_name_kak');
            if(name) {
                document.getElementById('display-name').innerText = name;
                document.getElementById('onboarding-screen').classList.add('hidden-screen');
                document.getElementById('main-content').classList.remove('hidden');
            }
            const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
            const today = days[new Date().getDay()];
            document.getElementById('date-label').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'short' });
            
            const schedCont = document.getElementById('schedule-container');
            const items = scheduleData[today] || ["Libur"];
            schedCont.innerHTML = items.map(m => `
                <div class="card-dark p-5 rounded-[2rem] flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="p-3 bg-violet-500/10 text-violet-400 rounded-2xl"><i data-lucide="${iconMap[m] || 'book'}"></i></div>
                        <div><h3 class="font-bold text-slate-100">${m}</h3><p class="text-[9px] text-slate-500 uppercase">${teacherData[m] || ''}</p></div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCauwyYKo6DV6OdpLKrTC25x3JMjO3AXNU",
            authDomain: "jadwal-pelajaran-xa-ad5e8.firebaseapp.com",
            databaseURL: "https://jadwal-pelajaran-xa-ad5e8-default-rtdb.firebaseio.com",
            projectId: "jadwal-pelajaran-xa-ad5e8",
            storageBucket: "jadwal-pelajaran-xa-ad5e8.firebasestorage.app",
            messagingSenderId: "564182819795",
            appId: "1:564182819795:web:df4a58f02c5bed1a954526"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const userName = localStorage.getItem("smaneta_user_name_kak") || "Anon";
        let myId = localStorage.getItem("class_uid");
        if(!myId) { myId = "id_" + Math.random().toString(36).substr(2, 9); localStorage.setItem("class_uid", myId); }

        // SHARED NOTES
        const sNoteRef = ref(db, "class_shared_notes");
        document.getElementById("add-class-note").onclick = () => {
            const txt = document.getElementById("class-note-input");
            const dt = document.getElementById("class-note-date");
            if(txt.value && dt.value) {
                push(sNoteRef, { text: txt.value, date: dt.value, author: userName, uid: myId, createdAt: serverTimestamp() });
                txt.value = ""; dt.value = "";
            }
        };

        onValue(sNoteRef, (snap) => {
            const cont = document.getElementById("class-notes-container");
            cont.innerHTML = "";
            snap.forEach(child => {
                const val = child.val();
                cont.innerHTML += `
                    <div class="card-dark p-5 rounded-[2rem] flex justify-between items-center border-l-4 border-cyan-500">
                        <div>
                            <h3 class="font-bold text-sm text-slate-100">${val.text}</h3>
                            <p class="text-[9px] text-cyan-400 font-bold mt-1 uppercase">${val.author} • ${val.date}</p>
                        </div>
                        ${val.uid === myId ? `<button onclick="deleteShared('${child.key}')" class="text-red-400 p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : ''}
                    </div>`;
            });
            lucide.createIcons();
        });

        window.deleteShared = (key) => { if(confirm("Hapus info?")) remove(ref(db, "class_shared_notes/" + key)); };

        // FORUM
        const forumRef = ref(db, "class_forum");
        document.getElementById("send-forum").onclick = () => {
            const msg = document.getElementById("forum-input");
            if(msg.value) {
                push(forumRef, { name: userName, text: msg.value, uid: myId, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}), createdAt: serverTimestamp() });
                msg.value = "";
            }
        };

        onValue(forumRef, (snap) => {
            const cont = document.getElementById("forum-container");
            cont.innerHTML = "";
            snap.forEach(child => {
                const m = child.val();
                const isMe = m.uid === myId;
                cont.innerHTML += `
                    <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                        <div class="${isMe ? 'bg-emerald-600/20 border border-emerald-500/30' : 'bg-slate-800'} p-3 rounded-2xl max-w-[85%]">
                            <p class="text-[10px] font-bold ${isMe ? 'text-emerald-400' : 'text-violet-400'} mb-1">${m.name}</p>
                            <p class="text-sm text-slate-200">${m.text}</p>
                            <p class="text-[8px] text-slate-500 mt-1 text-right">${m.time}</p>
                        </div>
                    </div>`;
            });
            cont.scrollTop = cont.scrollHeight;
        });
    </script>
</body>
</html>
