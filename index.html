<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smaneta Dashboard - Personal Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #0f172a; 
            color: #f1f5f9; 
            overflow-x: hidden;
        }
        .neon-border {
            border: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.1);
        }
        .card-dark {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .deadline-glow {
            border: 1px solid #ef4444;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
            animation: pulse-border 2s infinite;
        }
        @keyframes pulse-border {
            0% { border-color: rgba(239, 68, 68, 0.5); }
            50% { border-color: rgba(239, 68, 68, 1); }
            100% { border-color: rgba(239, 68, 68, 0.5); }
        }
        input {
            background: #1e293b !important;
            color: white !important;
            border: none !important;
        }
        #onboarding-screen {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease;
        }
        .hidden-screen {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }
        #quote-display {
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="onboarding-screen" class="fixed inset-0 z-[100] bg-slate-950 flex flex-col items-center justify-center p-8">
        <div class="w-full max-w-xs space-y-8 text-center">
            <div class="p-5 bg-violet-600/20 rounded-3xl inline-block neon-border mb-4">
                <i data-lucide="terminal" class="w-12 h-12 text-violet-400"></i>
            </div>
            <div class="space-y-2">
                <h2 class="text-3xl font-bold tracking-tighter text-white">Halo, Kak!</h2>
                <p class="text-slate-400 text-sm">Masukin nama Kakak buat mulai.</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="user-name-input" placeholder="Nama Kakak siapa?" 
                       class="w-full px-6 py-4 rounded-2xl focus:ring-2 focus:ring-violet-500 text-center font-bold outline-none">
                <button onclick="saveName()" class="w-full py-4 bg-violet-600 hover:bg-violet-500 rounded-2xl font-bold shadow-lg shadow-violet-900/20 transition-all active:scale-95 text-white">
                    Masuk Sekarang
                </button>
            </div>
            <p class="text-[10px] text-slate-600 uppercase tracking-widest pt-8">Brought to you by Agil Dev Service</p>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <header class="p-8 pt-12">
            <div class="max-w-md mx-auto">
                <div class="flex justify-between items-start">
                    <div>
                        <h1 class="text-4xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-fuchsia-400 italic">
                            Hello, <span id="display-name">User</span>.
                        </h1>
                        <p id="date-label" class="text-slate-400 text-sm mt-1 font-light tracking-widest uppercase"></p>
                    </div>
                    <button onclick="resetName()" class="p-3 bg-slate-800 rounded-2xl neon-border text-slate-500 hover:text-violet-400">
                        <i data-lucide="user-cog" class="w-6 h-6"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-md mx-auto px-6 space-y-10 pb-32">
            <section>
                <div class="flex items-center gap-2 mb-6">
                    <div class="h-1 w-8 bg-amber-500 rounded-full shadow-[0_0_10px_rgba(245,158,11,0.8)]"></div>
                    <h2 class="text-xl font-bold tracking-tight">Mood Booster</h2>
                </div>
                <div class="card-dark p-8 rounded-[3rem] text-center neon-border">
                    <div class="bg-violet-500/5 p-6 rounded-[2rem] mb-6 min-h-[120px] flex items-center justify-center border border-dashed border-violet-500/20">
                        <p id="quote-display" class="text-slate-300 text-sm italic leading-relaxed">"Klik tombol di bawah buat dapet asupan kata-kata hari ini!"</p>
                    </div>
                    <button onclick="generateQuote()" class="w-full py-4 bg-gradient-to-r from-amber-600 to-orange-600 text-white rounded-2xl font-bold text-sm shadow-lg active:scale-95 flex items-center justify-center gap-2">
                        <i data-lucide="shuffle" class="w-4 h-4"></i> Acak Kata-kata
                    </button>
                </div>
            </section>

            <section>
                <div class="flex items-center gap-2 mb-6">
                    <div class="h-1 w-8 bg-violet-500 rounded-full shadow-[0_0_10px_rgba(139,92,246,0.8)]"></div>
                    <h2 class="text-xl font-bold tracking-tight">Jadwal Hari Ini</h2>
                </div>
                <div id="schedule-container" class="grid gap-4"></div>
            </section>

            <section>
                <div class="flex items-center gap-2 mb-6">
                    <div class="h-1 w-8 bg-fuchsia-500 rounded-full shadow-[0_0_10px_rgba(217,70,239,0.8)]"></div>
                    <h2 class="text-xl font-bold tracking-tight">System Notes</h2>
                </div>
                <div class="card-dark p-6 rounded-[2.5rem] mb-6 neon-border">
                    <div class="space-y-4">
                        <input type="text" id="note-task" placeholder="Tambah catatan..." class="w-full px-4 py-3.5 rounded-2xl focus:outline-none focus:ring-1 focus:ring-violet-500 text-sm">
                        <div class="flex gap-2">
                            <input type="date" id="note-date" class="flex-grow px-4 py-3.5 rounded-2xl focus:outline-none focus:ring-1 focus:ring-violet-500 text-sm">
                            <button onclick="saveNote()" class="bg-violet-600 p-4 rounded-2xl active:scale-90"><i data-lucide="plus" class="text-white"></i></button>
                        </div>
                    </div>
                </div>
                <div id="notes-container" class="space-y-4"></div>
            </section>

            <footer class="text-center py-10 opacity-30 text-[10px] tracking-[0.3em] uppercase">
                Product of Agil Web Service
            </footer>
        </main>
    </div>

    <div id="teacher-modal" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950/80 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div class="card-dark w-full max-w-xs p-8 rounded-[3rem] text-center neon-border relative scale-90 transition-transform duration-300">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-500"><i data-lucide="x"></i></button>
            <div class="w-16 h-16 bg-violet-500/20 rounded-full flex items-center justify-center mx-auto mb-4 border border-violet-500/30">
                <i data-lucide="user-round" class="text-violet-400"></i>
            </div>
            <h4 id="modal-mapel" class="text-[10px] font-bold text-violet-400 tracking-[0.2em] uppercase mb-1"></h4>
            <h3 id="modal-guru" class="text-2xl font-bold text-white mb-6"></h3>
            <button onclick="closeModal()" class="w-full py-3 bg-slate-800 text-slate-300 rounded-2xl font-bold text-sm">TUTUP</button>
        </div>
    </div>

    <script>
        const teacherData = { "Pancasila": "Bu Febi", "Informatika": "Pak Arif", "Bahasa Inggris": "Bu Asih", "Bader": "Bu Lila", "Geografi": "Bu Loka", "Bahasa Indonesia": "Bu Azizah", "PJOK": "Pak Alby", "Matematika": "Bu Intarti", "Sejarah": "Pak Andika", "Kimia": "Bu Deny", "Fisika": "Bu Dewi", "Prakarya dan Kewirausahaan": "Bu Annisa", "Agama": "Bu Ilun", "Sosiologi": "Pak Afi", "Ekonomi": "Bu Novita", "Biologi": "Bu Bidri" };
        const iconMap = { "Pancasila": "landmark", "Informatika": "cpu", "Bahasa Inggris": "languages", "Bader": "book-open", "Geografi": "globe-2", "Bahasa Indonesia": "pen-tool", "PJOK": "activity", "Matematika": "variable", "Sejarah": "history", "Kimia": "beaker", "Fisika": "atom", "Prakarya dan Kewirausahaan": "briefcase", "Sosiologi": "users", "Ekonomi": "trending-up", "Biologi": "dna", "Agama": "heart", "Libur": "coffee" };
        const scheduleData = { "Senin": ["Pancasila", "Informatika", "Bahasa Inggris", "Bader", "Geografi"], "Selasa": ["Bahasa Indonesia", "PJOK", "Matematika", "Sejarah"], "Rabu": ["Kimia", "Fisika", "Bahasa Inggris", "Prakarya dan Kewirausahaan"], "Kamis": ["Matematika", "Agama", "Bader", "Pancasila"], "Jumat": ["Sosiologi", "Bahasa Indonesia", "Ekonomi", "Biologi"], "Sabtu": ["Libur"], "Minggu": ["Libur"] };
        
        const allQuotes = [
            "Chat 'P' doang tapi deg-degannya sampai besok.", "Nunggu balasan dia berasa nunggu hilal, lama bener.", "Jatuh cinta itu gratis, yang mahal itu gengsinya.", "Kita adalah dua orang yang saling tahu, tapi pura-pura bisu.", "'Lagi apa?' adalah kode keras buat 'Gua kangen lo'.", "Mencintai dalam diam itu seperti main catur tanpa raja; nggak ada ujungnya.", "Patah hati pas SMA itu rasanya kayak kiamat, padahal tugas Fisika lebih ngeri.", "Kamu itu kayak variabel x, susah dicari tapi selalu ada di soal hidupku.", "Jangan baper sama perhatian, siapa tahu dia emang ramah ke semua orang.", "Definisi sakit tapi nggak berdarah: Lihat dia ketawa sama yang lain.", "Menunggu itu membosankan, tapi demi kamu, gua jadi pro.", "Sadar diri itu penting, biar nggak terlalu dalam jatuhnya.", "Cinta nggak perlu sempurna, yang penting nggak main belakang.", "Kadang kita cuma butuh didengerin, bukan dinasehatin soal perasaan.", "Mantan itu alumni hati, nggak usah sering-sering kunjungan industri.", "Crush itu penyemangat sekolah, tapi juga sumber galau di pojok kelas.", "Suka sama teman sekelas itu risiko tinggi; kalau putus, tiap hari ketemu.", "Berhenti nyari yang sempurna kalau yang tulus udah di depan mata.", "Hubungan tanpa status itu kayak lari di treadmill; capek tapi nggak maju-maju.", "Cemburu itu tanda sayang, tapi kalau berlebihan itu tanda kurang kerjaan.", "Jangan terlalu berharap sama manusia, kecewanya bisa bikin trauma.", "Cowok sejati itu yang berani nyatain perasaan, bukan main kode-kodean.", "Cewek tulus itu yang mau nemenin dari nol, bukan pas udah di puncak.", "Terkadang kita cuma rindu kenangannya, bukan orangnya.", "Cinta monyet itu lucu, yang nggak lucu itu kalau monyetnya kita.", "Jarak itu ujian, kalau lolos berarti kalian memang pantas.", "Pura-pura nggak lihat pas papasan padahal jantung mau copot.", "Luka hati obatnya bukan orang baru, tapi waktu dan diri sendiri.", "Terlalu nyaman jadi teman adalah jebakan paling menyakitkan.", "Cinta itu kayak trading; harus tahu kapan entry, kapan stop loss.", "Sayang itu tindakan, bukan sekadar kata-kata di bio sosmed.", "Kelak kita akan menertawakan kegalauan kita hari ini.", "Dunia nggak berhenti berputar cuma karena kamu putus cinta.", "Hargai yang ada sekarang, sebelum dia jadi milik orang lain.", "Kenapa harus takut ditolak? Setidaknya kamu sudah mencoba.", "Jadikan dia alasanmu semangat sekolah, bukan alasanmu bolos.", "Teman sejati itu yang berani jujur kalau lo salah.", "Circle kecil itu lebih tenang daripada circle besar tapi penuh drama.", "Sahabat itu yang tahu semua kejelekan lo tapi nggak pergi.", "Nongkrong nggak harus mahal, yang penting obrolannya berbobot.", "Tertawa bareng sahabat itu obat stres paling ampuh setelah ulangan.", "Sahabat sejati bakal narik lo pas lo mulai melenceng dari jalur.", "Masa depan lu nggak ditentukan oleh nilai satu kertas ujian.", "Disiplin itu jembatan antara target dan pencapaian.", "Jangan cuma bermimpi di bawah selimut, bangun dan kerjakan!", "Belajar finansial sejak dini itu bukan soal uang, tapi soal kebebasan.", "Fokus pada proses, hasil itu bonus dari kerja keras.", "Investasi terbaik adalah investasi ke otak sendiri.", "Analisis dulu risikonya, baru ambil langkah besarnya.", "Orang sukses itu yang tetap gerak pas yang lain lagi tidur.", "Jangan takut salah pas belajar, kesalahan adalah guru terbaik.", "Kurangi mengeluh, perbanyak mencari solusi.", "Mental yang kuat dibentuk melalui tekanan yang besar.", "Sukses butuh kesabaran, nggak ada yang instan kecuali mie.", "Jadilah versi terbaik dari dirimu sendiri, bukan fotokopi orang lain.", "Kualitas diri bakal menarik orang yang berkualitas juga."
        ];

        let notes = JSON.parse(localStorage.getItem('agil_notes_v_final_kak')) || [];
        
        function init() {
            lucide.createIcons();
            updateDate();
            checkUser();
            renderSchedule();
            renderNotes();
        }

        function checkUser() {
            const savedName = localStorage.getItem('smaneta_user_name_kak');
            if (savedName) {
                document.getElementById('display-name').innerText = savedName;
                document.getElementById('onboarding-screen').classList.add('hidden-screen');
                document.getElementById('main-content').classList.remove('hidden');
            } else {
                document.getElementById('main-content').classList.add('hidden');
            }
        }

        function saveName() {
            const nameInput = document.getElementById('user-name-input').value;
            if (!nameInput) return;
            localStorage.setItem('smaneta_user_name_kak', nameInput);
            checkUser();
        }

        function resetName() {
            if(confirm("Mau ganti nama Kak?")) {
                localStorage.removeItem('smaneta_user_name_kak');
                location.reload();
            }
        }

        function updateDate() {
            const now = new Date();
            const options = { weekday: 'long', day: 'numeric', month: 'short' };
            document.getElementById('date-label').innerText = now.toLocaleDateString('id-ID', options);
        }

        function generateQuote() {
            const display = document.getElementById('quote-display');
            const randomIdx = Math.floor(Math.random() * allQuotes.length);
            display.style.opacity = 0;
            setTimeout(() => {
                display.innerText = `"${allQuotes[randomIdx]}"`;
                display.style.opacity = 1;
            }, 300);
        }

        function renderSchedule() {
            const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
            const today = days[new Date().getDay()];
            const container = document.getElementById('schedule-container');
            const items = scheduleData[today] || ["Libur"];
            container.innerHTML = items.map((mapel) => `
                <div onclick="openModal('${mapel}')" class="card-dark p-5 rounded-[2rem] flex items-center justify-between hover:bg-slate-800 transition-all cursor-pointer active:scale-95 group">
                    <div class="flex items-center gap-4">
                        <div class="p-3 bg-violet-500/10 text-violet-400 rounded-2xl"><i data-lucide="${iconMap[mapel] || 'book'}"></i></div>
                        <div><h3 class="font-bold text-slate-100">${mapel}</h3><p class="text-[9px] text-slate-500 uppercase tracking-widest font-black">Info Guru</p></div>
                    </div>
                    <i data-lucide="info" class="w-4 h-4 text-slate-700"></i>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function openModal(mapel) {
            const m = document.getElementById('teacher-modal');
            document.getElementById('modal-mapel').innerText = mapel;
            document.getElementById('modal-guru').innerText = teacherData[mapel] || "Data tidak ditemukan";
            m.classList.remove('hidden');
            setTimeout(() => { m.classList.add('opacity-100'); m.children[0].classList.remove('scale-90'); }, 10);
        }

        function closeModal() {
            const m = document.getElementById('teacher-modal');
            m.classList.remove('opacity-100'); m.children[0].classList.add('scale-90');
            setTimeout(() => m.classList.add('hidden'), 300);
        }

        function renderNotes() {
            const container = document.getElementById('notes-container');
            const todayStr = new Date().toISOString().split('T')[0];
            container.innerHTML = notes.map(note => `
                <div class="card-dark p-6 rounded-[2.5rem] flex justify-between items-center ${note.date === todayStr ? 'deadline-glow' : ''}">
                    <div class="space-y-1">
                        <h3 class="font-bold text-slate-200 text-sm">${note.task}</h3>
                        <p class="text-[10px] text-slate-500 italic">${note.date}</p>
                    </div>
                    <button onclick="deleteNote(${note.id})" class="text-slate-700 hover:text-red-400"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
            localStorage.setItem('agil_notes_v_final_kak', JSON.stringify(notes));
        }

        function saveNote() {
            const t = document.getElementById('note-task'), d = document.getElementById('note-date');
            if (!t.value || !d.value) return;
            notes.push({ id: Date.now(), task: t.value, date: d.value });
            t.value = ''; d.value = ''; renderNotes();
        }

        function deleteNote(id) { notes = notes.filter(n => n.id !== id); renderNotes(); }

        window.onload = init;
    </script>

<!-- FIREBASE REALTIME CLASS FEATURES -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* GANTI DENGAN CONFIG FIREBASE KAMU */
const firebaseConfig = {
  apiKey: "AIzaSyCauwyYKo6DV6OdpLKrTC25x3JMjO3AXNU",
  authDomain: "jadwal-pelajaran-xa-ad5e8.firebaseapp.com",
  projectId: "jadwal-pelajaran-xa-ad5e8",
  storageBucket: "jadwal-pelajaran-xa-ad5e8.firebasestorage.app",
  messagingSenderId: "564182819795",
  appId: "1:564182819795:web:df4a58f02c5bed1a954526",
  measurementId: "G-9J42ZKMTDC"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ===============================
   TAMBAH SECTION BARU KE UI
================================ */

window.addEventListener("load",()=>{

const main=document.querySelector("main");

const newSection=document.createElement("div");

newSection.innerHTML=`

<section class="mt-10">

<div class="flex items-center gap-2 mb-6">
<div class="h-1 w-8 bg-cyan-500 rounded-full shadow-[0_0_10px_rgba(6,182,212,0.8)]"></div>
<h2 class="text-xl font-bold tracking-tight">Class Shared Notes</h2>
</div>

<div class="card-dark p-6 rounded-[2.5rem] mb-6 neon-border">

<input id="class-note-input"
placeholder="Tambah catatan kelas..."
class="w-full px-4 py-3.5 rounded-2xl text-sm mb-3">

<input type="date"
id="class-note-date"
class="w-full px-4 py-3.5 rounded-2xl text-sm mb-3">

<button id="add-class-note"
class="w-full py-3 bg-cyan-600 rounded-2xl font-bold text-sm">
Tambah Note
</button>

</div>

<div id="class-notes-container" class="space-y-4"></div>

</section>



<section class="mt-10">

<div class="flex items-center gap-2 mb-6">
<div class="h-1 w-8 bg-emerald-500 rounded-full shadow-[0_0_10px_rgba(16,185,129,0.8)]"></div>
<h2 class="text-xl font-bold tracking-tight">Forum Kelas</h2>
</div>

<div class="card-dark p-6 rounded-[2.5rem] mb-6 neon-border">

<input id="forum-input"
placeholder="Tulis pesan..."
class="w-full px-4 py-3.5 rounded-2xl text-sm mb-3">

<button id="send-forum"
class="w-full py-3 bg-emerald-600 rounded-2xl font-bold text-sm">
Kirim
</button>

</div>

<div id="forum-container" class="space-y-4"></div>

</section>

`;

main.insertBefore(newSection, main.querySelector("footer"));

});


/* ===============================
   USER DATA
================================ */

function getUser(){

return localStorage.getItem("smaneta_user_name_kak") || "Anon";

}

let uid=localStorage.getItem("class_uid");

if(!uid){

uid="user_"+Date.now();
localStorage.setItem("class_uid",uid);

}

/* ===============================
   SHARED NOTES REALTIME
================================ */

const notesRef=ref(db,"class_shared_notes");

window.addEventListener("load",()=>{

document.getElementById("add-class-note").onclick=()=>{

const input=document.getElementById("class-note-input");

if(!input.value) return;

const date=document.getElementById("class-note-date");

if(!date.value) return;

const date=document.getElementById("class-note-date");

if(!input.value || !date.value) return;

push(notesRef,{
text:input.value,
date:date.value,
author:getUser(),
uid:uid
});

input.value="";
date.value="";

input.value="";

};

});


onValue(notesRef,(snap)=>{

const container=document.getElementById("class-notes-container");

if(!container) return;

container.innerHTML="";

snap.forEach(child=>{

const n=child.val();
const id=child.key;

const del=n.uid===uid
? `<button onclick="deleteShared('${id}')" class="text-red-400">hapus</button>`
: "";

container.innerHTML+=`

<div class="card-dark p-6 rounded-[2.5rem] flex justify-between items-center">

<div>
<h3 class="font-bold text-sm">${n.text}</h3>
<p class="text-[10px] text-slate-500 italic">${n.date}</p>
<p class="text-[10px] text-slate-400">${n.author}</p>
</div>

${del}

</div>

`;

});

});


window.deleteShared=(id)=>{

remove(ref(db,"class_shared_notes/"+id));

};


/* ===============================
   FORUM REALTIME
================================ */

const forumRef=ref(db,"class_forum");

window.addEventListener("load",()=>{

document.getElementById("send-forum").onclick=()=>{

const input=document.getElementById("forum-input");

if(!input.value) return;

(forumRef,{
name:getUser(),
text:input.value
});

input.value="";

};

});


onValue(forumRef,(snap)=>{

const container=document.getElementById("forum-container");

if(!container) return;

container.innerHTML="";

snap.forEach(child=>{

const msg=child.val();

container.innerHTML+=`

<div class="card-dark p-4 rounded-[2rem]">

<b class="text-emerald-400 text-sm">${msg.name}</b>

<p class="text-slate-300 text-sm">${msg.text}</p>

</div>

`;

});

container.scrollTop=container.scrollHeight;

});

</script>
</body>
</html>
