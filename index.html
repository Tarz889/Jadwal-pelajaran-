    <style>
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #020617; 
            color: #f1f5f9; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .neon-border {
            border: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.1);
        }
        .card-dark {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #8b5cf6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        #onboarding-screen { transition: all 0.6s ease-in-out; }
        .hidden-screen { opacity: 0; pointer-events: none; transform: translateY(-50px); }
        .delete-btn:active { transform: scale(0.9); background-color: #ef4444; color: white; }
    </style>

        // STARTUP
        async function initAuth() {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        }
        initAuth();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userState = user;
                checkUserSession();
            }
        });

        function checkUserSession() {
            const name = localStorage.getItem('acil_v4_username');
            if (name) {
                document.getElementById('display-name').innerText = name;
                document.getElementById('onboarding-screen').classList.add('hidden-screen');
                document.getElementById('main-content').classList.remove('hidden');
                setTimeout(() => document.getElementById('main-content').style.opacity = "1", 50);
                startCloudSync();
            }
        }

        // GLOBAL HANDLERS (Ditempel ke window)
        window.handleSaveName = () => {
            const val = document.getElementById('user-name-input').value.trim();
            if (val.length > 1) {
                localStorage.setItem('acil_v4_username', val);
                checkUserSession();
            }
        };

        window.handleResetName = () => {
            if(confirm("Logout dari sesi ini?")) {
                localStorage.removeItem('acil_v4_username');
                location.reload();
            }
        };

        window.handleSaveNote = async () => {
            const t = document.getElementById('note-task'), d = document.getElementById('note-date');
            if (!t.value || !d.value || !userState) return;
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'notes'), {
                task: t.value, date: d.value, author: localStorage.getItem('acil_v4_username'), createdAt: serverTimestamp()
            });
            t.value = ''; d.value = '';
        };

        // FIXED DELETE HANDLER
        window.handleDeleteNote = async (docId) => {
            if (!docId) return;
            if(confirm("Hapus catatan ini selamanya?")) {
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'notes', docId);
                    await deleteDoc(docRef);
                    console.log("Delete success:", docId);
                } catch (e) {
                    console.error("Delete Error:", e);
                }
            }
        };

        window.handleSendMessage = async () => {
            const input = document.getElementById('chat-input');
            if (!input.value || !userState) return;
            const text = input.value;
            input.value = '';
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'chats'), {
                text, author: localStorage.getItem('acil_v4_username'), createdAt: serverTimestamp()
            });
        };

        window.handleGenerateQuote = () => {
            const disp = document.getElementById('quote-display');
            disp.style.opacity = "0";
            setTimeout(() => {
                disp.innerText = `"${quotesBank[Math.floor(Math.random() * quotesBank.length)]}"`;
                disp.style.opacity = "1";
            }, 250);
        };

        // SYNCING
        function startCloudSync() {
            updateUIInfo();
            
            // Sync Notes
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'notes'), (snap) => {
                const arr = [];
                snap.forEach(d => arr.push({ id: d.id, ...d.data() }));
                arr.sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                renderNotes(arr);
            });

            // Sync Chat
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'chats'), (snap) => {
                const arr = [];
                snap.forEach(d => arr.push({ id: d.id, ...d.data() }));
                arr.sort((a,b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
                renderChats(arr);
            });
        }

        function renderNotes(list) {
            const container = document.getElementById('notes-container');
            if (list.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-700 py-10 text-[9px] font-black uppercase tracking-widest opacity-40 italic">Tidak ada tugas</p>`;
                return;
            }
            container.innerHTML = list.map(n => `
                <div class="card-dark p-6 rounded-[2rem] flex justify-between items-center transition-all hover:border-white/10">
                    <div class="space-y-1">
                        <h3 class="font-bold text-slate-200 text-sm">${n.task}</h3>
                        <div class="flex gap-3 text-[9px] font-black uppercase opacity-60 italic">
                            <span class="text-fuchsia-400">📅 ${n.date}</span>
                            <span>• ${n.author}</span>
                        </div>
                    </div>
                    <!-- BUTTON HAPUS DENGAN ONCLICK GLOBAL -->
                    <button onclick="handleDeleteNote('${n.id}')" class="delete-btn p-4 bg-red-500/10 text-red-500 rounded-2xl hover:bg-red-500/20 transition-all border border-red-500/10">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function renderChats(list) {
            const container = document.getElementById('chat-container');
            const myName = localStorage.getItem('acil_v4_username');
            container.innerHTML = list.map(m => {
                const isMe = m.author === myName;
                return `
                    <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                        <span class="text-[8px] font-black uppercase text-slate-500 mb-1 px-2 italic">${m.author}</span>
                        <div class="px-5 py-3 rounded-2xl max-w-[85%] text-sm ${isMe ? 'bg-violet-600 text-white rounded-tr-none shadow-lg' : 'bg-slate-800 text-slate-200 rounded-tl-none border border-white/5'}">
                            ${m.text}
                        </div>
                    </div>
                `;
            }).join('');
            container.scrollTop = container.scrollHeight;
        }

        function updateUIInfo() {
            const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
            const today = days[new Date().getDay()];
            document.getElementById('day-badge').innerText = today;
            document.getElementById('date-label').innerText = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
            
            const items = scheduleList[today] || ["Libur"];
            document.getElementById('schedule-container').innerHTML = items.map(m => `
                <div class="card-dark p-5 rounded-[2.2rem] flex items-center gap-5">
                    <div class="p-4 bg-violet-600/10 text-violet-400 rounded-3xl">
                        <i data-lucide="${mapelIcons[m] || 'book-open'}" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-slate-100">${m}</h3>
                        <p class="text-[9px] text-slate-600 uppercase font-black tracking-widest mt-0.5">${teacherList[m] || 'Free Time'}</p>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

    </script>
